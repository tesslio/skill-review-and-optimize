name: 'Tessl Skill Review & Optimize'
description: 'Review SKILL.md files in pull requests and optionally optimize them with AI-powered suggestions'
branding:
  icon: zap
  color: purple
inputs:
  mode:
    description: 'Action mode: "review" (default) or "apply" (commit optimized content from a previous review)'
    default: 'review'
  path:
    description: 'Root path to search for SKILL.md files'
    default: '.'
  comment:
    description: 'Whether to post results as a PR comment'
    default: 'true'
  fail-threshold:
    description: 'Minimum average score (0-100) to pass the check. Set to 0 to never fail.'
    default: '0'
  optimize:
    description: 'Run skill optimization after review (requires tessl-token)'
    default: 'false'
  optimize-iterations:
    description: 'Max optimization iterations (1-10)'
    default: '3'
  inline-suggestions:
    description: 'Post optimization changes as inline GitHub `suggestion` blocks on the PR diff (in addition to the summary comment). Lets authors cherry-pick individual changes.'
    default: 'false'
  tessl-token:
    description: 'Tessl API token for optimize mode. Get one at https://tessl.io/account/api-keys'
    required: false
runs:
  using: 'composite'
  steps:
    - uses: tesslio/setup-tessl@7b21cb04671af0bec4807758467f27c17d217172 # v1
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
    - run: bun install --production --frozen-lockfile
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Run review
      if: inputs.mode == 'review'
      run: bun ${{ github.action_path }}/src/main.ts
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_FAIL_THRESHOLD: ${{ inputs.fail-threshold }}
        INPUT_OPTIMIZE: ${{ inputs.optimize }}
        INPUT_OPTIMIZE_ITERATIONS: ${{ inputs.optimize-iterations }}
        INPUT_INLINE_SUGGESTIONS: ${{ inputs.inline-suggestions }}
        TESSL_API_TOKEN: ${{ inputs.tessl-token }}
        TESSL_TOKEN: ${{ inputs.tessl-token }}
        GITHUB_TOKEN: ${{ github.token }}
    - name: Apply optimization
      if: inputs.mode == 'apply'
      run: bun ${{ github.action_path }}/src/apply.ts
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
